<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project — Krish Jaiswal</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" rx="15" fill="%230d0d0d"/><text x="50" y="50" text-anchor="middle" dominant-baseline="middle" font-family="Arial Black, Impact" font-weight="900" font-size="52" fill="%23C8FF00">FD</text></svg>'
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
     <link rel="stylesheet" href="krishjais.github.io\style.css"/>
    <base href="krishjais.github.io\">
    <style>
      /* Project page specific */
      .project-page {
        padding: 140px 48px 80px;
        max-width: 1100px;
        margin: 0 auto;
      }
      .proj-back {
        font-family: var(--font-m);
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(242, 237, 228, 0.4);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 48px;
        transition: color 0.2s;
      }
      .proj-back:hover {
        color: var(--acid);
      }
      .proj-cat {
        font-family: var(--font-m);
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--acid);
        margin-bottom: 12px;
      }
      .proj-title {
        font-family: var(--font-d);
        font-size: clamp(56px, 8vw, 110px);
        line-height: 0.9;
        margin-bottom: 28px;
      }
      .proj-meta {
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
        margin-bottom: 60px;
        padding-bottom: 40px;
        border-bottom: 1px solid var(--border);
      }
      .pm-item label {
        font-family: var(--font-m);
        font-size: 10px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(242, 237, 228, 0.35);
        display: block;
        margin-bottom: 6px;
      }
      .pm-item span {
        font-size: 14px;
        color: var(--white);
      }
      .proj-hero-img {
        width: 100%;
        aspect-ratio: 16/9;
        border-radius: 4px;
        margin-bottom: 60px;

        overflow: hidden;
        border: 1px solid var(--border);
      }
      .proj-hero-img-inner {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .proj-desc {
        font-size: 16px;
        line-height: 1.8;
        color: rgba(242, 237, 228, 0.7);
        margin-bottom: 40px;
      }
      .proj-desc strong {
        color: var(--white);
      }
      .proj-section-label {
        font-family: var(--font-d);
        font-size: 36px;
        color: var(--acid);
        margin-bottom: 20px;
      }
      .proj-description-label {
        color: var(--pink);
        margin-top: 12px;
      }
      .proj-description-text {
        font-size: 16px;
        line-height: 1.8;
        color: rgba(242, 237, 228, 0.7);
        margin-bottom: 44px;
      }
      .proj-gallery {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 60px;
      }
      .proj-gallery-item {
        aspect-ratio: 4/3;
        border-radius: 4px;
        border: 1px solid var(--border);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .proj-gallery-item:first-child {
        grid-column: span 2;
        aspect-ratio: 21/9;
      }
      .proj-nav {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        margin-top: 60px;
        padding-top: 40px;
        border-top: 1px solid var(--border);
      }
      .proj-nav-btn {
        font-family: var(--font-m);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--white);
        text-decoration: none;
        border: 1px solid var(--border);
        padding: 12px 24px;
        border-radius: 2px;
        transition: all 0.25s;
      }
      .proj-nav-btn:hover {
        border-color: var(--acid);
        color: var(--acid);
      }
      @media (max-width: 768px) {
        .project-page {
          padding: 100px 24px 60px;
        }
        .proj-gallery {
          grid-template-columns: 1fr;
        }
        .proj-gallery-item:first-child {
          grid-column: span 1;
        }
        .proj-nav {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <nav id="navbar">
      <a href="index.html" class="nav-logo">KJ<span class="dot">.</span></a>
      <ul class="nav-links">
        <li><a href="index.html#work">Work</a></li>

        <li><a href="index.html#skills">Skills</a></li>

      <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </button>
    </nav>
    <div class="mobile-menu" id="mobileMenu">
      <ul>
        <li><a href="index.html#work" class="mob-link">Work</a></li>
        <li><a href="index.html#about" class="mob-link">About</a></li>
        <li><a href="index.html#skills" class="mob-link">Skills</a></li>
        <li><a href="index.html#contact" class="mob-link">Contact</a></li>
      </ul>
    </div>

    <main class="project-page" id="projContent">
      <a href="index.html#work" class="proj-back">← Back to Work</a>
      <p class="proj-cat" id="projCat">Category</p>
      <h1 class="proj-title" id="projTitle">Project Title</h1>

      <div class="proj-meta">
        <div class="pm-item">
          <label>Year</label><span id="projYear">2024</span>
        </div>
        <div class="pm-item">
          <label>Category</label><span id="projCatMeta">—</span>
        </div>
        <div class="pm-item">
          <label>Tools</label><span id="projTools">—</span>
        </div>
        <div class="pm-item">
          <label>Role</label><span id="projRole">—</span>
        </div>
      </div>

      <div class="proj-hero-img">
        <div class="proj-hero-img-inner" id="projHeroBg"></div>
      </div>

      <p class="proj-desc" id="projDesc">Loading...</p>

      <h2 class="proj-section-label proj-description-label">
        Project Description
      </h2>
      <p class="proj-description-text" id="projDesc2">Loading...</p>

      <h2 class="proj-section-label">Gallery</h2>
      <div class="proj-gallery" id="projGallery"></div>

      <div class="proj-nav">
        <a href="index.html#work" class="proj-nav-btn">← All Projects</a>
        <a
          href="https://www.behance.net/gallery/228984997/PORTFOLIO/modules/1427417047"
          target="_blank"
          class="proj-nav-btn"
          >View on Behance ↗</a
        >
      </div>
    </main>

    <footer>
      <div class="footer-inner">
        <span class="footer-logo">KJ<span class="acid">.</span></span>
        <p>© 2025 Krish Jaiswal.</p>
        <a href="index.html#hero" class="back-top">Back to Top ↑</a>
      </div>
    </footer>

    <script>
      // Project data
      const projects = {
        goswasthya: {
          cat: "Branding",
          title: "Goswasthya",
          year: "2025",
          tools: "Adobe Illustrator, Photoshop",
          role: "Package Designer",
          descTop: `<strong>GoSwasthya</strong> is a premium Indian food and wellness brand dedicated to bringing traditional, preservative-free nutrition back into everyday households. Founded with the vision of providing clean and wholesome food for future generations, the brand specializes in freshly stone-milled flours, wood cold-pressed oils, Vedic Bilona ghee, natural spices, and other authentic grocery essentials. Every product is crafted using traditional methods, sourced responsibly, and prepared with a strong commitment to purity, freshness, and sustainability. The brand combines age-old Indian food wisdom with modern convenience, helping families make healthier choices without compromising on taste or quality.`,
          descBottom: `For GoSwasthya, I developed a complete brand identity focused on communicating trust, purity, and traditional Indian values. The design approach was centered around creating a clean and premium visual language that reflects the brand's commitment to natural ingredients and authentic food practices. Through strategic use of typography, color psychology, packaging elements, and brand storytelling, the identity was designed to resonate with health-conscious consumers while maintaining a strong connection to Indian heritage. The final outcome successfully enhanced brand recognition and created a cohesive visual experience across multiple touchpoints.`,
          heroImage: "assets/goswasthya_main.png",
          heroBg: "linear-gradient(135deg,#1a1a2e,#16213e,#c8ff00)",
          galleryImages: [
            "assets/goswasthya_first.png",
            "assets/goswasthya_sec.png",
            "assets/goswasthya_third.png",
          ],
          galleryColors: [
            "linear-gradient(135deg,#0f3460,#16213e)",
            "linear-gradient(135deg,#c8ff00,#80a000)",
            "linear-gradient(135deg,#1a1a2e,#c8ff00,#1a1a2e)",
          ],
        },
        "dating-app": {
          cat: "Branding",
          title: "Holy Cow",
          year: "2026",
          tools: "Adobe Illustrator",
          role: "Package Designer",
          descTop: ``,
          descBottom: `Holy Cow is a fresh and wholesome food brand focused on promoting healthy eating through simple, trustworthy products. For this project, I developed a complete brand identity and packaging design centered around a friendly cow mascot and custom wordmark that instantly communicate purity, freshness, and approachability. The packaging for the Makhan Butter range uses vibrant blue tones, playful illustrations, and clean typography to create strong shelf appeal while reinforcing the brand’s warm, homemade personality. The result is a cohesive visual identity that helps Holy Cow stand out in the market while staying true to its promise: “Eat Fresh! Eat Healthy!”
`,
          heroImage: "assets/11.png",
          heroBg: "linear-gradient(135deg,#ff006e,#8338ec,#3a86ff)",
          galleryImages: ["assets/12.png", "assets/13.png"],
          galleryRatios: {
            "assets/13.png": "21/9",
          },
          galleryColors: [
            "linear-gradient(135deg,#ff006e,#8338ec)",
            "linear-gradient(135deg,#3a86ff,#8338ec)",
            ,
          ],
        },
        poster1: {
          cat: "Poster Design",
          title: "Cater Bunees",
          year: "2024",
          tools: "Adobe Photoshop, Illustrator",
          role: "Graphic Designer",
          descTop: ``,
          descBottom: `For Cater Bunees, I designed a vibrant Rajasthani-themed promotional poster created to introduce and showcase their special regional menu. The concept draws inspiration from Rajasthan’s rich culture, colorful traditions, and renowned hospitality. A custom illustrated character dressed in traditional attire serves as the focal point, creating an inviting and memorable visual experience. Combined with warm colors, authentic cultural elements, and appetizing food imagery, the design successfully captures the essence of Rajasthani cuisine while engaging customers and strengthening the brand’s visual identity.
`,
          heroImage: "assets/18.png",
          heroBg: "linear-gradient(135deg,#f72585,#7209b7,#3a0ca3)",
          galleryImages: ["assets/19.png"],
          galleryColors: ["linear-gradient(135deg,#f72585,#7209b7)"],
        },
        social1: {
          cat: "Logo Design",
          title: "HappiestHer",
          year: "2025",
          tools: "Canva, Adobe illustrator",
          role: "Logo Designer",
          descTop: ``,
          descBottom: `HappiestHer is a purpose-driven NGO dedicated to empowering women, fostering independence, and creating opportunities for personal and professional growth. For this project, I designed a modern and minimal brand identity that reflects confidence, progress, and optimism. The logo combines clean typography with an upward-moving symbol, representing growth, empowerment, and the journey toward a brighter future. A subtle gradient accent adds warmth and positivity while maintaining a professional and trustworthy appearance. Designed for both digital and print applications, the identity helps establish a strong, recognizable presence that aligns with the organization's mission of inspiring, supporting, and uplifting women.
`,
          heroImage: "assets/1.png",
          heroBg: "linear-gradient(135deg,#06d6a0,#118ab2,#073b4c)",
          galleryImages: ["assets/2.png", "assets/3.png"],
          galleryColors: [
            "linear-gradient(135deg,#118ab2,#073b4c)",
            "linear-gradient(135deg,#06d6a0,#118ab2)",
          ],
        },
        logos: {
          cat: "Poster",
          title: "Dalchini",
          year: "2025",
          tools: "Adobe Illustrator",
          role: "Poster Designer",
          descTop: ``,
          descBottom: `For Dalchini – Infuse Taste, I designed a promotional poster that captures the vibrant energy and bold flavors of Indian street food. The objective was to create an eye-catching marketing piece that reflects the brand’s premium yet approachable personality while showcasing its diverse menu offerings. By combining rich colors, appetizing food photography, clean typography, and a dynamic layout, the design creates a strong visual impact and encourages customer engagement. The final artwork effectively communicates Dalchini’s promise of authentic taste, making it suitable for promotions, catering events, and both online and offline marketing campaigns.`,
          heroImage: "assets/15.png",
          heroBg: "linear-gradient(135deg,#ff9f1c,#ffbf69,#2d3561)",
          galleryImages: ["assets/16.png"],
          galleryColors: ["linear-gradient(135deg,#ff9f1c,#e76f51)"],
        },
        packaging: {
          cat: "Social Media Design",
          title: "King's Alchemy",
          year: "2024",
          tools: "Adobe Illustrator",
          role: "Graphic Designer",
          descTop: ``,
          descBottom: `For King’s Alchemy, a premium wellness and Shilajit supplement brand, I designed a series of social media creatives focused on educating customers while reinforcing the brand’s credibility and premium positioning. The campaign highlights key product benefits, wellness milestones, and brand trust factors through a clean visual hierarchy, bold typography, and a refined gold-inspired color palette. By combining informative content with engaging layouts and lifestyle-focused imagery, the designs effectively communicate the brand’s commitment to performance, vitality, and overall well-being while maintaining a consistent and professional social media presence.
`,
          heroImage: "assets/24.png",
          heroBg: "linear-gradient(135deg,#d62828,#f77f00,#fcbf49)",
          galleryImages: ["assets/20.png", "assets/21.png", "assets/22.png"],
          galleryFit: "contain",
          galleryColors: [
            "linear-gradient(135deg,#f77f00,#fcbf49)",
            "linear-gradient(135deg,#f77f00,#fcbf49)",

            "linear-gradient(135deg,#d62828,#fcbf49)",
          ],
        },
        music: {
          cat: "Branding",
          title: "Warmleaf",
          year: "2024",
          tools: "Adobe Photoshop, After Illustrator",
          role: "Visual Designer",
          descTop: ``,
          descBottom: `Warmleaf is a modern café brand designed to evoke feelings of comfort, warmth, and connection through every customer interaction. For this project, I developed a complete brand identity centered around a custom logo that combines a coffee cup, flowing leaves, and heart-shaped steam to symbolize quality coffee, natural ingredients, and a welcoming atmosphere. The visual identity features warm earthy tones, elegant typography, and a clean design system that reflects the café’s cozy and premium character. The branding was applied across various touchpoints, including signage, promotional materials, and packaging mockups, creating a cohesive and memorable experience that helps Warmleaf stand out as a destination for coffee lovers and casual gatherings alike.
`,
          heroImage: "assets/27.png",
          heroBg: "linear-gradient(135deg,#2d00f7,#6a00f4,#8900f2)",
          galleryImages: ["assets/6.png", "assets/5.png", "assets/7.png"],
          galleryFit: "contain",
          galleryColors: [
            "linear-gradient(135deg,#2d00f7,#6a00f4)",
            "linear-gradient(135deg,#6a00f4,#ff2d6f)",
            "linear-gradient(135deg,#2d00f7,#00d4ff)",
          ],
        },
        personal: {
          cat: "Branding",
          title: "Personal Brand Identity",
          year: "2024",
          tools: "Adobe Illustrator, Photoshop",
          role: "Brand Designer",
          descTop: `Sample top paragraph for Personal Brand Identity. You can edit this first paragraph separately for this project only.`,
          descBottom: `Sample bottom paragraph for Personal Brand Identity. You can edit this second paragraph separately for this project only.`,
          heroImage: "assets/sample.png",
          heroBg: "linear-gradient(135deg,#0d0d0d,#1a1a1a,#333)",
          galleryColors: [
            "linear-gradient(135deg,#111,#c8ff00)",
            "linear-gradient(135deg,#c8ff00,#0d0d0d)",
            "linear-gradient(135deg,#0d0d0d,#ff2d6f)",
          ],
        },
      };

      // Load project from URL param
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id") || "goswasthya";
      const proj = projects[id] || projects["goswasthya"];

      document.getElementById("projCat").textContent = proj.cat;
      document.getElementById("projTitle").textContent = proj.title;
      document.getElementById("projYear").textContent = proj.year;
      document.getElementById("projCatMeta").textContent = proj.cat;
      document.getElementById("projTools").textContent = proj.tools;
      document.getElementById("projRole").textContent = proj.role;
      document.getElementById("projDesc").innerHTML = proj.descTop;
      document.getElementById("projDesc2").innerHTML = proj.descBottom;
      document.title = proj.title + " — Krish Jaiswal";

      const heroBg = document.getElementById("projHeroBg");
      if (proj.heroImage) {
        heroBg.style.backgroundImage = `url('${proj.heroImage}')`;
        heroBg.style.backgroundSize = "cover";
        heroBg.style.backgroundPosition =
          id === "goswasthya" ? "calc(50% - 15px) center" : "center";
        heroBg.style.backgroundRepeat = "no-repeat";
      } else {
        heroBg.style.background = proj.heroBg;
      }
      heroBg.style.minHeight = "100%";

      // Gallery placeholder tiles
      const gallery = document.getElementById("projGallery");
      if (proj.galleryImages && proj.galleryImages.length) {
        proj.galleryImages.forEach((img) => {
          const item = document.createElement("div");
          item.className = "proj-gallery-item";
          const mappedRatio = proj.galleryRatios && proj.galleryRatios[img];
          if (mappedRatio) {
            item.style.aspectRatio = mappedRatio;
            item.style.gridColumn = "span 2";
          } else if (id === "packaging") {
            item.style.aspectRatio = "1/1";
            item.style.gridColumn = "span 1";
          }
          item.style.backgroundImage = `url('${img}')`;
          item.style.backgroundSize =
            proj.galleryFit === "contain" ? "contain" : "cover";
          item.style.backgroundPosition = "center";
          item.style.backgroundRepeat = "no-repeat";
          gallery.appendChild(item);
        });
      } else {
        proj.galleryColors.forEach((bg) => {
          const item = document.createElement("div");
          item.className = "proj-gallery-item";
          item.style.background = bg;
          gallery.appendChild(item);
        });
      }

      // Cursor
      const cursor = document.getElementById("cursor");
      const ring = document.getElementById("cursor-ring");
      let mx = 0,
        my = 0,
        rx = 0,
        ry = 0;
      document.addEventListener("mousemove", (e) => {
        mx = e.clientX;
        my = e.clientY;
        cursor.style.transform = `translate(${mx - 5}px,${my - 5}px)`;
      });
      (function animRing() {
        rx += (mx - rx - 17) * 0.12;
        ry += (my - ry - 17) * 0.12;
        ring.style.transform = `translate(${rx}px,${ry}px)`;
        requestAnimationFrame(animRing);
      })();

      // Navbar
      const navbar = document.getElementById("navbar");
      window.addEventListener("scroll", () =>
        navbar.classList.toggle("scrolled", scrollY > 60),
      );

      // Hamburger
      const hamburger = document.getElementById("hamburger");
      const mobileMenu = document.getElementById("mobileMenu");
      hamburger.addEventListener("click", () => {
        hamburger.classList.toggle("open");
        mobileMenu.classList.toggle("open");
      });
    </script>
  </body>
</html>
