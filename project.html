<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project — Krish Jaiswal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="D:\downloads\files/style.css" />
    <style>
      /* Project page specific */
      .project-page {
        padding: 140px 48px 80px;
        max-width: 1100px;
        margin: 0 auto;
      }
      .proj-back {
        font-family: var(--font-m);
        font-size: 11px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(242, 237, 228, 0.4);
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 48px;
        transition: color 0.2s;
      }
      .proj-back:hover {
        color: var(--acid);
      }
      .proj-cat {
        font-family: var(--font-m);
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--acid);
        margin-bottom: 12px;
      }
      .proj-title {
        font-family: var(--font-d);
        font-size: clamp(56px, 8vw, 110px);
        line-height: 0.9;
        margin-bottom: 28px;
      }
      .proj-meta {
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
        margin-bottom: 60px;
        padding-bottom: 40px;
        border-bottom: 1px solid var(--border);
      }
      .pm-item label {
        font-family: var(--font-m);
        font-size: 10px;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: rgba(242, 237, 228, 0.35);
        display: block;
        margin-bottom: 6px;
      }
      .pm-item span {
        font-size: 14px;
        color: var(--white);
      }
      .proj-hero-img {
        width: 100%;
        aspect-ratio: 16/9;
        border-radius: 4px;
        margin-bottom: 60px;
        overflow: hidden;
        border: 1px solid var(--border);
      }
      .proj-hero-img-inner {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .proj-desc {
        font-size: 16px;
        line-height: 1.8;
        color: rgba(242, 237, 228, 0.7);
        margin-bottom: 40px;
      }
      .proj-desc strong {
        color: var(--white);
      }
      .proj-section-label {
        font-family: var(--font-d);
        font-size: 36px;
        color: var(--acid);
        margin-bottom: 20px;
      }
      .proj-gallery {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 60px;
      }
      .proj-gallery-item {
        aspect-ratio: 4/3;
        border-radius: 4px;
        border: 1px solid var(--border);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .proj-gallery-item:first-child {
        grid-column: span 2;
        aspect-ratio: 21/9;
      }
      .proj-nav {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        margin-top: 60px;
        padding-top: 40px;
        border-top: 1px solid var(--border);
      }
      .proj-nav-btn {
        font-family: var(--font-m);
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--white);
        text-decoration: none;
        border: 1px solid var(--border);
        padding: 12px 24px;
        border-radius: 2px;
        transition: all 0.25s;
      }
      .proj-nav-btn:hover {
        border-color: var(--acid);
        color: var(--acid);
      }
      @media (max-width: 768px) {
        .project-page {
          padding: 100px 24px 60px;
        }
        .proj-gallery {
          grid-template-columns: 1fr;
        }
        .proj-gallery-item:first-child {
          grid-column: span 1;
        }
        .proj-nav {
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div id="cursor"></div>
    <div id="cursor-ring"></div>

    <nav id="navbar">
      <a href="index.html" class="nav-logo">KJ<span class="dot">.</span></a>
      <ul class="nav-links">
        <li><a href="index.html#work">Work</a></li>
        <li><a href="index.html#about">About</a></li>
        <li><a href="index.html#skills">Skills</a></li>
        <li><a href="index.html#contact">Contact</a></li>
      </ul>
      <a href="index.html#contact" class="nav-cta">Hire Me ↗</a>
      <button class="hamburger" id="hamburger">
        <span></span><span></span><span></span>
      </button>
    </nav>
    <div class="mobile-menu" id="mobileMenu">
      <ul>
        <li><a href="index.html#work" class="mob-link">Work</a></li>
        <li><a href="index.html#about" class="mob-link">About</a></li>
        <li><a href="index.html#skills" class="mob-link">Skills</a></li>
        <li><a href="index.html#contact" class="mob-link">Contact</a></li>
      </ul>
    </div>

    <main class="project-page" id="projContent">
      <a href="index.html#work" class="proj-back">← Back to Work</a>
      <p class="proj-cat" id="projCat">Category</p>
      <h1 class="proj-title" id="projTitle">Project Title</h1>

      <div class="proj-meta">
        <div class="pm-item">
          <label>Year</label><span id="projYear">2024</span>
        </div>
        <div class="pm-item">
          <label>Category</label><span id="projCatMeta">—</span>
        </div>
        <div class="pm-item">
          <label>Tools</label><span id="projTools">—</span>
        </div>
        <div class="pm-item">
          <label>Role</label><span id="projRole">—</span>
        </div>
      </div>

      <div class="proj-hero-img">
        <div class="proj-hero-img-inner" id="projHeroBg"></div>
      </div>

      <p class="proj-desc" id="projDesc">Loading...</p>

      <h2 class="proj-section-label">Gallery</h2>
      <div class="proj-gallery" id="projGallery"></div>

      <div class="proj-nav">
        <a href="index.html#work" class="proj-nav-btn">← All Projects</a>
        <a
          href="https://www.behance.net/rougekjt"
          target="_blank"
          class="proj-nav-btn"
          >View on Behance ↗</a
        >
      </div>
    </main>

    <footer>
      <div class="footer-inner">
        <span class="footer-logo">KJ<span class="acid">.</span></span>
        <p>© 2025 Krish Jaiswal.</p>
        <a href="index.html#hero" class="back-top">Back to Top ↑</a>
      </div>
    </footer>

    <script>
      // Project data
      const projects = {
        goswasthya: {
          cat: "Branding",
          title: "Goswasthya",
          year: "2024",
          tools: "Adobe Illustrator, Photoshop",
          role: "Brand Designer",
          desc: `<strong>Goswasthya</strong> is a health & wellness brand for which I developed a complete brand identity from scratch. The project involved deep research into the target audience, competitor analysis, and defining the brand personality before translating it into visual form.<br/><br/>The identity system includes a custom logo, a carefully chosen color palette inspired by nature and health, typography guidelines, packaging design, and a social media kit — ensuring visual consistency across all touchpoints.`,
          heroBg: "linear-gradient(135deg,#1a1a2e,#16213e,#c8ff00)",
          galleryColors: [
            "linear-gradient(135deg,#0f3460,#16213e)",
            "linear-gradient(135deg,#c8ff00,#80a000)",
            "linear-gradient(135deg,#1a1a2e,#c8ff00,#1a1a2e)",
          ],
        },
        "dating-app": {
          cat: "UI/UX Design",
          title: "Dating App Concept",
          year: "2024",
          tools: "Figma, Adobe Illustrator",
          role: "UI/UX Designer",
          desc: `A full UI/UX concept for a modern dating application designed with my team. The focus was on creating an <strong>emotionally resonant</strong> experience — from onboarding flows to match interactions and chat interfaces.<br/><br/>The design system includes 20+ screens, a custom component library, micro-interaction specs, and a full color/type system. The visual language balances warmth with sophistication.`,
          heroBg: "linear-gradient(135deg,#ff006e,#8338ec,#3a86ff)",
          galleryColors: [
            "linear-gradient(135deg,#ff006e,#8338ec)",
            "linear-gradient(135deg,#3a86ff,#8338ec)",
            "linear-gradient(135deg,#ff006e,#ffbe0b)",
          ],
        },
        poster1: {
          cat: "Poster Design",
          title: "Event Poster Series",
          year: "2024",
          tools: "Adobe Photoshop, Illustrator",
          role: "Graphic Designer",
          desc: `A series of bold typographic event posters for college festivals and social awareness campaigns. Each poster in the series uses a distinctive grid system while maintaining visual cohesion through a shared type hierarchy and color language.<br/><br/>The challenge was creating <strong>maximum visual impact</strong> at small sizes (Instagram posts) and large formats (6×4 ft prints) simultaneously.`,
          heroBg: "linear-gradient(135deg,#f72585,#7209b7,#3a0ca3)",
          galleryColors: [
            "linear-gradient(135deg,#f72585,#7209b7)",
            "linear-gradient(135deg,#7209b7,#3a0ca3)",
            "linear-gradient(135deg,#4cc9f0,#7209b7)",
          ],
        },
        social1: {
          cat: "Social Media",
          title: "Social Media Kit",
          year: "2024",
          tools: "Canva, Adobe Photoshop",
          role: "Graphic Designer",
          desc: `A complete social media design kit including Instagram post templates, story frames, highlight cover icons, and LinkedIn banners for a brand. The kit was designed to be <strong>easily editable</strong> by the client while maintaining visual quality.<br/><br/>Deliverables included 30+ templates across multiple formats, a usage guide, and font/color references.`,
          heroBg: "linear-gradient(135deg,#06d6a0,#118ab2,#073b4c)",
          galleryColors: [
            "linear-gradient(135deg,#06d6a0,#1b4332)",
            "linear-gradient(135deg,#118ab2,#073b4c)",
            "linear-gradient(135deg,#06d6a0,#118ab2)",
          ],
        },
        logos: {
          cat: "Branding",
          title: "Logo Design Collection",
          year: "2023-24",
          tools: "Adobe Illustrator",
          role: "Logo Designer",
          desc: `A curated collection of logo designs crafted for startups and small businesses across food, technology, and lifestyle sectors. Each logo was developed through a thorough process — brief, research, sketching, digital refinement, and final delivery with brand guidelines.<br/><br/>The collection showcases range — from <strong>geometric wordmarks</strong> to pictorial marks and combination logos.`,
          heroBg: "linear-gradient(135deg,#ff9f1c,#ffbf69,#2d3561)",
          galleryColors: [
            "linear-gradient(135deg,#ff9f1c,#e76f51)",
            "linear-gradient(135deg,#2d3561,#c72c41)",
            "linear-gradient(135deg,#ffbf69,#ff9f1c)",
          ],
        },
        packaging: {
          cat: "Packaging Design",
          title: "Packaging Design",
          year: "2024",
          tools: "Adobe Illustrator, Photoshop",
          role: "Packaging Designer",
          desc: `Product packaging concepts developed for FMCG and lifestyle brands. The projects involved understanding shelf presence, material constraints, printing specs, and consumer psychology — then translating that into <strong>visually arresting packaging</strong>.<br/><br/>Each package was designed for real-world production, including bleed marks, color profiles, and die-line specifications.`,
          heroBg: "linear-gradient(135deg,#d62828,#f77f00,#fcbf49)",
          galleryColors: [
            "linear-gradient(135deg,#d62828,#f77f00)",
            "linear-gradient(135deg,#f77f00,#fcbf49)",
            "linear-gradient(135deg,#d62828,#fcbf49)",
          ],
        },
        music: {
          cat: "Social Media",
          title: "Music Brand Campaign",
          year: "2024",
          tools: "Adobe Photoshop, After Effects",
          role: "Visual Designer",
          desc: `A complete visual campaign designed for an independent music artist's single launch. The project included <strong>Instagram post designs, Reel cover frames, YouTube banner, and story templates</strong> — all unified under a dark, cinematic aesthetic that matched the song's mood.<br/><br/>The campaign reached 10k+ people organically in its first week.`,
          heroBg: "linear-gradient(135deg,#2d00f7,#6a00f4,#8900f2)",
          galleryColors: [
            "linear-gradient(135deg,#2d00f7,#6a00f4)",
            "linear-gradient(135deg,#6a00f4,#ff2d6f)",
            "linear-gradient(135deg,#2d00f7,#00d4ff)",
          ],
        },
        personal: {
          cat: "Branding",
          title: "Personal Brand Identity",
          year: "2024",
          tools: "Adobe Illustrator, Photoshop",
          role: "Brand Designer",
          desc: `My own personal brand identity — designed to represent me as a designer-developer hybrid with a bold, modern aesthetic. The process involved soul-searching for what I truly stand for, then building a visual system that communicates it instantly.<br/><br/>The result: a <strong>geometric KJ monogram</strong>, an acid-green color system, custom stationery, email signature, and a social media presence guide — all cohesive and distinctive.`,
          heroBg: "linear-gradient(135deg,#0d0d0d,#1a1a1a,#333)",
          galleryColors: [
            "linear-gradient(135deg,#111,#c8ff00)",
            "linear-gradient(135deg,#c8ff00,#0d0d0d)",
            "linear-gradient(135deg,#0d0d0d,#ff2d6f)",
          ],
        },
      };

      // Load project from URL param
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id") || "goswasthya";
      const proj = projects[id] || projects["goswasthya"];

      document.getElementById("projCat").textContent = proj.cat;
      document.getElementById("projTitle").textContent = proj.title;
      document.getElementById("projYear").textContent = proj.year;
      document.getElementById("projCatMeta").textContent = proj.cat;
      document.getElementById("projTools").textContent = proj.tools;
      document.getElementById("projRole").textContent = proj.role;
      document.getElementById("projDesc").innerHTML = proj.desc;
      document.title = proj.title + " — Krish Jaiswal";

      const heroBg = document.getElementById("projHeroBg");
      heroBg.style.background = proj.heroBg;
      heroBg.style.minHeight = "100%";

      // Gallery placeholder tiles
      const gallery = document.getElementById("projGallery");
      proj.galleryColors.forEach((bg, i) => {
        const item = document.createElement("div");
        item.className = "proj-gallery-item";
        item.style.background = bg;
        gallery.appendChild(item);
      });

      // Cursor
      const cursor = document.getElementById("cursor");
      const ring = document.getElementById("cursor-ring");
      let mx = 0,
        my = 0,
        rx = 0,
        ry = 0;
      document.addEventListener("mousemove", (e) => {
        mx = e.clientX;
        my = e.clientY;
        cursor.style.transform = `translate(${mx - 5}px,${my - 5}px)`;
      });
      (function animRing() {
        rx += (mx - rx - 17) * 0.12;
        ry += (my - ry - 17) * 0.12;
        ring.style.transform = `translate(${rx}px,${ry}px)`;
        requestAnimationFrame(animRing);
      })();

      // Navbar
      const navbar = document.getElementById("navbar");
      window.addEventListener("scroll", () =>
        navbar.classList.toggle("scrolled", scrollY > 60),
      );

      // Hamburger
      const hamburger = document.getElementById("hamburger");
      const mobileMenu = document.getElementById("mobileMenu");
      hamburger.addEventListener("click", () => {
        hamburger.classList.toggle("open");
        mobileMenu.classList.toggle("open");
      });
    </script>
  </body>
</html>
